<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="EDM Wordle DJ sound waves">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b0b3a"/>
      <stop offset="0.55" stop-color="#0a0a14"/>
      <stop offset="1" stop-color="#05050a"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="0.5" stop-color="#7c4dff"/>
      <stop offset="1" stop-color="#ff00e5"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- glowing equalizer bars (symmetric around vertical center) -->
  <g fill="url(#bar)" filter="url(#glow)">
    <rect x="26"  y="170" width="16" height="60"  rx="8"/>
    <rect x="54"  y="140" width="16" height="120" rx="8"/>
    <rect x="82"  y="96"  width="16" height="208" rx="8"/>
    <rect x="110" y="150" width="16" height="100" rx="8"/>
    <rect x="138" y="60"  width="16" height="280" rx="8"/>
    <rect x="166" y="120" width="16" height="160" rx="8"/>
    <rect x="194" y="40"  width="16" height="320" rx="8"/>
    <rect x="222" y="120" width="16" height="160" rx="8"/>
    <rect x="250" y="60"  width="16" height="280" rx="8"/>
    <rect x="278" y="150" width="16" height="100" rx="8"/>
    <rect x="306" y="96"  width="16" height="208" rx="8"/>
    <rect x="334" y="140" width="16" height="120" rx="8"/>
    <rect x="362" y="170" width="16" height="60"  rx="8"/>
  </g>

  <!-- center waveform line -->
  <path d="M0 200 Q 50 200 70 160 T 130 200 Q 160 130 200 200 Q 240 270 270 200 T 330 200 Q 360 200 400 200"
        fill="none" stroke="#00e5ff" stroke-width="3" opacity="0.35"/>
</svg>
