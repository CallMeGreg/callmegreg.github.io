name: Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest

    steps:
      # TODO: Pin actions to full commit SHAs for supply chain security.
      # e.g. actions/checkout@<sha>, actions/setup-node@<sha>
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      # TODO: Pin to full SHA: actions/upload-pages-artifact@<sha>
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./build

  # Deploy job
  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # TODO: Pin to full SHA: actions/deploy-pages@<sha>
        uses: actions/deploy-pages@v4
